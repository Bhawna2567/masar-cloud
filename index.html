<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Masar — Curriculum Diagnostic & Skill Development</title>
<meta name="theme-color" content="#0b6e4f">
<meta name="description" content="UAE MOE curriculum diagnostic, gap analysis, skill plan and progress tracker for Grades 6–12.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Masar">
<style>
:root{
  --green:#0b6e4f; --green-d:#085138; --gold:#c8a24a; --gold-d:#a9842f;
  --red:#b3261e; --amber:#e6a700; --ok:#1b873f;
  --ink:#1d2733; --muted:#5f6b7a; --line:#e3e8ef; --bg:#f5f7fa; --card:#ffffff;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.10);
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-tap-highlight-color:transparent}
a{color:var(--green)}
.app{max-width:1080px;margin:0 auto;padding:0 18px 90px}
header.top{background:linear-gradient(120deg,var(--green),var(--green-d));color:#fff;padding:calc(16px + env(safe-area-inset-top)) 22px 16px;border-radius:0 0 16px 16px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.logo{width:42px;height:42px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;color:#1d2733;font-size:20px;flex-shrink:0}
.brand h1{margin:0;font-size:20px;letter-spacing:.3px}
.brand p{margin:2px 0 0;font-size:12px;opacity:.85}
#installBtn{margin-left:auto;background:var(--gold);color:#1d2733;border:none;padding:9px 14px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;display:none}
nav.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
nav.tabs button{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:9px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
nav.tabs button:hover{border-color:var(--green)}
nav.tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}
nav.tabs button:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card h2{margin:0 0 4px;font-size:18px}
.card .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:220px}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.4px}
input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink)}
input:focus,select:focus{outline:none;border-color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:8px;border:none;background:var(--green);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{background:var(--green-d)}
.btn.gold{background:var(--gold);color:#1d2733}.btn.gold:hover{background:var(--gold-d)}
.btn.ghost{background:#fff;color:var(--green);border:1px solid var(--green)}
.btn.ghost:hover{background:#f0f6f3}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.sm{padding:7px 12px;font-size:12px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.3px}
.pill.green{background:#e5f3ec;color:var(--ok)}
.pill.amber{background:#fdf3da;color:var(--gold-d)}
.pill.red{background:#fbe7e6;color:var(--red)}
.pill.grey{background:#eef1f5;color:var(--muted)}
.q{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.q .meta{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.q .stem{font-size:15px;font-weight:600;margin-bottom:12px}
.opt{display:block;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:.12s}
.opt:hover{border-color:var(--green);background:#f6faf8}
.opt input{width:auto;margin-right:10px}
.opt.sel{border-color:var(--green);background:#eef7f2}
.bar{height:10px;border-radius:6px;background:#eef1f5;overflow:hidden}
.bar > span{display:block;height:100%;border-radius:6px;background:var(--green)}
.kpi{display:flex;gap:14px;flex-wrap:wrap}
.kpi .box{flex:1;min-width:140px;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.kpi .box .n{font-size:26px;font-weight:800}
.kpi .box .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.skillrow td{vertical-align:middle}
.muted{color:var(--muted)}
.center{text-align:center}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-size:42px;margin-bottom:10px}
.folder{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.folder .fh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;background:#fafbfc}
.folder .fh:hover{background:#f3f6f9}
.folder .fh .ft{font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.folder .body{padding:6px 16px 14px;display:none}
.folder.open .body{display:block}
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
.task:last-child{border-bottom:none}
.task input{width:auto;margin-top:3px}
.task .tt{font-size:14px}
.task .ts{font-size:12px;color:var(--muted)}
.chartwrap{display:flex;align-items:flex-end;gap:10px;height:170px;padding:10px 0;border-bottom:1px solid var(--line)}
.chartwrap .colbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
.chartwrap .colbar .vb{width:70%;background:var(--green);border-radius:6px 6px 0 0;transition:.4s;min-height:2px}
.chartwrap .colbar .vb.plan{background:var(--gold)}
.legend{display:flex;gap:16px;font-size:12px;margin-top:10px;color:var(--muted)}
.legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.notice{background:#fff8e8;border:1px solid #f0e2b8;border-radius:10px;padding:12px 14px;font-size:13px;color:#7a5d00;margin-bottom:16px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tag{font-size:11px;background:#eef1f5;color:var(--muted);padding:2px 8px;border-radius:6px;font-weight:700}
.termtag{font-size:10px;background:#eef7f2;color:var(--green);border:1px solid #cfe6da;padding:1px 6px;border-radius:5px;font-weight:700;margin-right:6px}
.print-only{display:none}
#exModal .ovl{position:fixed;inset:0;background:rgba(16,24,40,.55);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:100;overflow:auto}
#exModal .ex{background:#fff;max-width:780px;width:100%;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.28);padding:22px;margin:auto}
.exq{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.opt.exok{border-color:var(--ok);background:#e5f3ec}
.opt.exbad{border-color:var(--red);background:#fbe7e6}
@media print{nav.tabs,header.top .brand p,#installBtn,.no-print{display:none!important}.app{padding:0}.print-only{display:block}}
</style>
</head>
<body>
<header class="top">
  <div class="logo">م</div>
  <div class="brand">
    <h1>Masar <span style="font-weight:400;opacity:.8;font-size:14px">مسار</span></h1>
    <p>UAE MOE Curriculum Diagnostic &amp; Skill Development · Grades 6–12 · English &amp; Math</p>
  </div>
  <div id="userChip" style="margin-left:auto;display:flex;gap:8px;align-items:center"></div>
  <button id="installBtn">⤓ Install app</button>
</header>

<div class="app">
  <nav class="tabs" id="tabs"></nav>
  <div id="view"></div>
</div>

<div id="exModal" style="display:none"></div>
<!-- Curriculum data (auto-generated from the official MOE files). Replace this file to extend. -->
<script src="curriculum.js"></script>
<script src="questions.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
/* ============================================================
   MASAR — app logic; curriculum lives in curriculum.js.
   ============================================================ */
if (typeof CURRICULUM === "undefined") { window.CURRICULUM = {}; }
if (typeof WRITING_PROMPTS === "undefined") { var WRITING_PROMPTS = {}; }

const GRADES = [
  {id:"6",label:"Grade 6"},{id:"7",label:"Grade 7"},{id:"8",label:"Grade 8"},
  {id:"9A",label:"Grade 9 Advanced"},{id:"9G",label:"Grade 9 General"},
  {id:"10A",label:"Grade 10 Advanced"},{id:"10G",label:"Grade 10 General"},
  {id:"11A",label:"Grade 11 Advanced"},{id:"11G",label:"Grade 11 General"},
  {id:"12A",label:"Grade 12 Advanced"},{id:"12G",label:"Grade 12 General"}
];
const ENG_SKILLS = ["Reading","Writing","Vocabulary","Grammar"];
const MATH_SKILLS = ["Number & Operations","Algebra","Geometry","Data & Probability"];

if (typeof QUESTION_BANK === "undefined") { var QUESTION_BANK = {}; }

/* ---- Firebase Auth + Firestore data layer (cloud) ---- */
try{ firebase.initializeApp(firebaseConfig); }catch(e){ console.warn("Firebase init:",e); }
const fbAuth=firebase.auth(), db=firebase.firestore();
let AUTH=null, CACHE={assignments:[]}, _unsub=[];
let VIEWING=null, READONLY=false;
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}
function assignments(){return CACHE.assignments;}
function freshState(){return {student:null,answers:{},result:null,plan:null,taskDone:{},writeResponse:"",activeTab:"home",authMode:"login"};}
function stateKey(){return "masar_cloud_state_"+(AUTH?AUTH.uid:"guest");}
let S=freshState();
function load(){return lsGet(stateKey(),null);}
function save(){ if(READONLY) return; if(AUTH&&AUTH.role==="student"){ lsSet(stateKey(),S); syncResultToAssignment(); } }
function loadStateForUser(){S=load()||freshState();}
function reset(){ if(READONLY) return; if(confirm("Clear this student's progress on this device and start over?")){ localStorage.removeItem(stateKey()); S=freshState(); render(); } }
function syncResultToAssignment(){
  if(!(AUTH&&AUTH.role==="student")||!S.result||!S.activeAssignment) return;
  const r=S.result;
  const payload={status:"completed",score:r.overallPct,level:r.level?r.level.name:"",levelCls:r.level?r.level.cls:"grey",skillPct:r.skillPct||{},subject:S.student.subject,writePrompt:r.writePrompt||"",writeResponse:r.writeResponse||"",completedAt:Date.now()};
  if(S.plan){
    let totalDone=0,totalAll=0,tp={};
    ["1","2","3"].forEach(t=>{let d=0,tt=0; S.plan.terms[t].weeks.forEach(w=>w.tasks.forEach((_,i)=>{tt++; if(S.taskDone[t+"-"+w.week+"-"+i])d++;})); tp[t]=tt?Math.round(d/tt*100):0; totalDone+=d; totalAll+=tt;});
    const focus=(S.plan.focus||[]).map(f=>{let d=0,tt=0; ["1","2","3"].forEach(t=>S.plan.terms[t].weeks.forEach(w=>{if(w.skill===f)w.tasks.forEach((_,i)=>{tt++; if(S.taskDone[t+"-"+w.week+"-"+i])d++;});})); return {skill:f,baseline:(S.result.skillPct[f]||0),planPct:tt?Math.round(d/tt*100):0};});
    payload.progress={yearPct:totalAll?Math.round(totalDone/totalAll*100):0,t1:tp["1"],t2:tp["2"],t3:tp["3"],totalDone:totalDone,totalAll:totalAll,focus:focus,updatedAt:Date.now()};
    payload.goals=S.plan.goals||[];
  }
  payload.snapshot={result:S.result,plan:S.plan,taskDone:S.taskDone||{},student:S.student};
  db.collection("assignments").doc(S.activeAssignment).set(payload,{merge:true}).catch(e=>console.warn("sync:",e));
}
function startListeners(){
  _unsub.forEach(u=>{try{u()}catch(e){}}); _unsub=[];
  if(AUTH.role==="teacher"){
    _unsub.push(db.collection("assignments").where("teacherUid","==",AUTH.uid).onSnapshot(s=>{CACHE.assignments=s.docs.map(d=>Object.assign({id:d.id},d.data())); render();}, e=>console.warn(e)));
    _unsub.push(db.collection("users").doc(AUTH.uid).onSnapshot(d=>{ if(d.exists){ AUTH=Object.assign({},AUTH,d.data(),{uid:AUTH.uid}); render(); } }, e=>console.warn(e)));
  } else {
    _unsub.push(db.collection("assignments").where("studentEmail","==",AUTH.email).onSnapshot(s=>{CACHE.assignments=s.docs.map(d=>Object.assign({id:d.id},d.data())); render();}, e=>console.warn(e)));
  }
}

const gLabel = id => (GRADES.find(g=>g.id===id)||{}).label||id;
const skillsFor = subj => subj==="Math"?MATH_SKILLS:ENG_SKILLS;
function levelFromPct(p){ if(p>=80)return{name:"On Track / Advanced",cls:"green"}; if(p>=60)return{name:"Approaching",cls:"amber"}; if(p>=40)return{name:"Developing",cls:"amber"}; return{name:"Needs Intensive Support",cls:"red"}; }
function rag(p){ return p>=80?"green":p>=55?"amber":"red"; }
function curriculumFor(grade, subj, skill){
  let out=[];
  ["1","2","3"].forEach(t=>{
    const arr=(CURRICULUM[grade]&&CURRICULUM[grade][t]&&CURRICULUM[grade][t][subj]&&CURRICULUM[grade][t][subj][skill])||[];
    arr.forEach(x=>{ if(x && !x.startsWith("(Upload")) out.push({term:t,text:x}); });
  });
  return out;
}

const TABS=[
  {id:"home",label:"🏠 My Dashboard",always:true},
  {id:"setup",label:"1 · Student Setup",always:true},
  {id:"diagnostic",label:"2 · Diagnostic Test",need:"student"},
  {id:"results",label:"3 · Level & Results",need:"result"},
  {id:"gaps",label:"4 · Gap Analysis",need:"result"},
  {id:"report",label:"5 · Parent/Teacher Report",need:"result"},
  {id:"goals",label:"🎯 My Goals",need:"result"},
  {id:"plan",label:"6 · Skill Development Plan",need:"result"},
  {id:"folders",label:"7 · Weekly Folders",need:"plan"},
  {id:"tracker",label:"8 · Progress Tracker",need:"plan"},
  {id:"curriculum",label:"📚 Curriculum",need:"student"}
];
function tabEnabled(t){ if(t.always)return true; if(t.need==="student")return !!S.student; if(t.need==="result")return !!S.result; if(t.need==="plan")return !!S.plan; return true; }
function renderTabs(){
  const el=document.getElementById("tabs"); el.innerHTML="";
  const hideTabs=VIEWING?["home","setup","diagnostic"]:[];
  TABS.forEach(t=>{
    if(hideTabs.indexOf(t.id)>=0) return;
    const b=document.createElement("button");
    b.textContent=t.label; b.disabled=!tabEnabled(t);
    if(S.activeTab===t.id)b.classList.add("active");
    b.onclick=()=>{S.activeTab=t.id;save();render();};
    el.appendChild(b);
  });
  const rb=document.createElement("button");rb.className="no-print";rb.style.marginLeft="auto";if(VIEWING){rb.textContent="← Back";rb.onclick=teacherCloseStudent;}else{rb.textContent="↺ Reset";rb.onclick=reset;}el.appendChild(rb);
}

function render(){
  const chip=document.getElementById("userChip");
  if(chip){ chip.innerHTML = AUTH?`<span class="pill ${AUTH.role==='teacher'?'amber':'green'}">${AUTH.role==='teacher'?'Teacher':'Student'}</span><span style="color:#fff;font-size:13px;font-weight:600">${(AUTH.name||'').split(' ')[0]}</span><button class="btn ghost sm" onclick="logout()">Log out</button>`:""; }
  const tabsEl=document.getElementById("tabs"); const v=document.getElementById("view");
  if(!AUTH){ tabsEl.innerHTML=""; v.innerHTML=viewAuth(); window.scrollTo(0,0); return; }
  if(AUTH.role==="teacher" && !VIEWING){ tabsEl.innerHTML=""; v.innerHTML=viewTeacher(); window.scrollTo(0,0); return; }
  renderTabs();
  const map={home:viewHome,setup:viewSetup,diagnostic:viewDiagnostic,results:viewResults,gaps:viewGaps,report:viewReport,goals:viewGoals,plan:viewPlan,folders:viewFolders,tracker:viewTracker,curriculum:viewCurriculum};
  if(!tabEnabled(TABS.find(t=>t.id===S.activeTab))){S.activeTab=VIEWING?"results":"home";}
  let inner=(map[S.activeTab]||viewHome)();
  if(VIEWING) inner=`<div class="notice" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">👁 Viewing <b>${VIEWING.studentName}</b>'s dashboard (read-only) <button class="btn ghost sm" onclick="teacherCloseStudent()">← Back to my dashboard</button></div>`+inner;
  v.innerHTML=inner;
  window.scrollTo(0,0);
}

/* ===== AUTH + DASHBOARDS (cloud) ===== */
function viewAuth(){
  const mode=S.authMode||"login";
  return `<div class="card" style="max-width:460px;margin:28px auto">
    <div style="text-align:center;margin-bottom:6px"><div style="font-size:30px;color:var(--green);font-weight:800">مسار · Masar</div><p class="muted" style="font-size:12px;margin:2px 0 0">Curriculum Diagnostic &amp; Skill Development</p></div>
    <div style="display:flex;gap:6px;margin:14px 0">
      <button class="btn ${mode==='login'?'':'ghost'} sm" style="flex:1" onclick="setAuthMode('login')">Log in</button>
      <button class="btn ${mode==='register'?'':'ghost'} sm" style="flex:1" onclick="setAuthMode('register')">Register</button>
    </div>
    ${mode==='register'?`<label>I am a…</label>
      <select id="a_role"><option value="teacher">Teacher</option><option value="student">Student</option></select>
      <div style="height:10px"></div>
      <label>Full name</label><input id="a_name" placeholder="e.g. Sara Al Hashimi"><div style="height:10px"></div>`:""}
    <label>School email</label><input id="a_email" type="email" placeholder="name@school.ae"><div style="height:10px"></div>
    <label>Password</label><input id="a_pass" type="password" placeholder="at least 6 characters" onkeydown="if(event.key==='Enter'){${mode==='register'?'doRegister':'doLogin'}()}">
    <div id="authMsg" style="font-size:12px;color:var(--red);margin-top:8px"></div>
    <div style="margin-top:14px"><button class="btn" style="width:100%" onclick="${mode==='register'?'doRegister':'doLogin'}()">${mode==='register'?'Create account':'Log in'}</button></div>
    <p class="muted" style="font-size:11px;margin-top:12px">Accounts are stored securely in the cloud — teachers and students can log in from any device.</p>
  </div>`;
}
function setAuthMode(m){S.authMode=m; render();}
function fbErr(e){ const c=(e&&e.code)||""; if(c.indexOf("email-already-in-use")>=0)return "An account with this email already exists — try logging in."; if(c.indexOf("wrong-password")>=0||c.indexOf("invalid-credential")>=0)return "Wrong email or password."; if(c.indexOf("user-not-found")>=0)return "No account found — try registering."; if(c.indexOf("invalid-email")>=0)return "Enter a valid email address."; if(c.indexOf("weak-password")>=0)return "Password too weak (at least 6 characters)."; if(c.indexOf("network")>=0)return "Network error — check your connection."; if(c.indexOf("configuration")>=0||c.indexOf("api-key")>=0)return "App not connected to Firebase yet (check firebase-config.js)."; return (e&&e.message)||"Something went wrong."; }
function doRegister(){
  const role=document.getElementById("a_role").value, name=document.getElementById("a_name").value.trim();
  const email=document.getElementById("a_email").value.trim().toLowerCase(), pass=document.getElementById("a_pass").value;
  const msg=document.getElementById("authMsg");
  if(!name||!email||!pass){msg.textContent="Please fill in all fields.";return;}
  if(pass.length<6){msg.textContent="Password must be at least 6 characters.";return;}
  msg.textContent="Creating account…";
  fbAuth.createUserWithEmailAndPassword(email,pass)
    .then(cred=>db.collection("users").doc(cred.user.uid).set({role:role,name:name,email:email,students:[]}))
    .catch(e=>{const m=document.getElementById("authMsg"); if(m)m.textContent=fbErr(e);});
}
function doLogin(){
  const email=document.getElementById("a_email").value.trim().toLowerCase(), pass=document.getElementById("a_pass").value;
  const msg=document.getElementById("authMsg"); msg.textContent="Logging in…";
  fbAuth.signInWithEmailAndPassword(email,pass).catch(e=>{const m=document.getElementById("authMsg"); if(m)m.textContent=fbErr(e);});
}
function logout(){ fbAuth.signOut(); }
function viewTeacher(){
  const me=AUTH, as=assignments(), roster=me.students||[];
  const grades=GRADES.map(g=>`<option value="${g.id}">${g.label}</option>`).join("");
  const rosterRows=roster.length?roster.map(s=>{
    const sa=as.filter(a=>a.studentEmail===s.email), done=sa.filter(a=>a.status==="completed");
    const last=done.slice().sort((a,b)=>(b.completedAt||0)-(a.completedAt||0))[0];
    return `<tr><td><b>${s.name}</b><div class="muted" style="font-size:11px">${s.email}</div></td>
      <td>${sa.length} assigned · ${done.length} done</td>
      <td>${last?`${last.score}% · ${last.level||""}`:"—"}</td>
      <td>${(last&&last.progress)?`${last.progress.yearPct}% <span class="muted" style="font-size:10px">(${last.progress.totalDone}/${last.progress.totalAll})</span>`:"—"}</td>
      <td>${last?`<button class="btn sm" onclick="teacherOpenStudent('${last.id}')">Open dashboard →</button>`:""}</td></tr>`;
  }).join(""):`<tr><td colspan="4" class="muted">No students yet — add one below.</td></tr>`;
  const studentOpts=roster.map(s=>`<option value="${s.email}">${s.name} (${s.email})</option>`).join("");

// Provisional, transparent auto-estimate of a written response (0-100), pending teacher rubric review.
function writingScore(text){
  text=(text||"").trim(); if(!text) return 0;
  const words=text.split(/\s+/).filter(Boolean).length;
  const sentences=(text.match(/[.!?]+/g)||[]).length || (words>0?1:0);
  const linkers=["however","because","therefore","first","second","finally","also","for example","in addition","although","moreover","as a result","in conclusion","on the other hand","furthermore","meanwhile","since","while","but ","so "];
  const lc=" "+text.toLowerCase()+" ";
  const transCount=linkers.filter(t=>lc.includes(t)).length;
  let score=0;
  score += Math.min(40, words/50*40);
  score += sentences>=3?25:(sentences===2?14:5);
  score += Math.min(20, transCount*10);
  if(/^[A-Z]/.test(text)) score+=8;
  if(/[.!?]$/.test(text)) score+=7;
  return Math.max(0,Math.min(100,Math.round(score)));
}
function grade(){
  if(READONLY) return;
  const qs=getQuestions();
  const subj=S.student.subject, areas=skillsFor(subj);
  const per={}; areas.forEach(a=>per[a]={correct:0,total:0});
  let correct=0;
  qs.forEach((q,i)=>{ per[q.skill].total++; if(S.answers[i]===q.answer){correct++;per[q.skill].correct++;} });
  const overallPct=Math.round(correct/qs.length*100);
  const skillPct={}; areas.forEach(a=>{ skillPct[a]= per[a].total? Math.round(per[a].correct/per[a].total*100):0; });
  let writingProvisional=null;
  if(subj==="English"){ const wr=(S.writeResponse||"").trim(); if(wr){ writingProvisional=writingScore(wr); skillPct["Writing"]=writingProvisional; } }
  S.result={ when:new Date().toISOString(), overallPct, correct, total:qs.length, skillPct, per, level:levelFromPct(overallPct) };
  S.result.writePrompt=(subj==="English"&&typeof WRITING_PROMPTS!=="undefined")?(WRITING_PROMPTS[S.student.prevGrade]||null):null;
  S.result.writeResponse=S.writeResponse||"";
  S.result.writingProvisional=writingProvisional;
  S.plan=generatePlan();
  S.activeTab="results"; save(); render();
}

function gapData(){

  });

function generatePlan(){
  const subj=S.student.subject, areas=skillsFor(subj);
  const gaps=areas.filter(a=>S.result.skillPct[a]<55);
  const focus = gaps.length?gaps:areas.slice();
  const WEEKS=6;
  const terms={};
  ["1","2","3"].forEach((t,ti)=>{
    const weeks=[];
    for(let w=1;w<=WEEKS;w++){
      const skill=focus[(w-1)%focus.length];
      const lib=ACTIVITY_LIB[skill]||["Practice activity"];
      const L=lib.length; const base=((ti*WEEKS)+(w-1))*3;
      const tasks=[lib[base%L], lib[(base+1)%L], lib[(base+2)%L]];
      weeks.push({week:w,skill,tasks});
    }
    terms[t]={ goal:`By end of Term ${t}: raise ${focus.join(", ")} toward grade-level mastery (target ${60+ti*10}%+).`, weeks };
  });
  const goals=focus.map(a=>{
    const b=S.result.skillPct[a]||0;
    const t1=Math.min(90,Math.max(b+15,55)), t2=Math.min(95,Math.max(t1+10,65)), t3=Math.min(98,Math.max(t2+10,75));
    return {skill:a, baseline:b, t1:t1, t2:t2, t3:t3,
      statement:`Improve ${a} from ${b}% to ${t3}% (grade-level) by year-end — term targets ${t1}% → ${t2}% → ${t3}%.`};
  });
  return {focus,termWeeks:WEEKS,terms,goals,createdFrom:S.result.when};
}

      <p class="muted" style="font-size:12px;margin-top:10px">Your activities to reach this goal are in <b>Weekly Folders</b> — open the ${g.skill} weeks and tap <b>▶ Practice</b>.</p>
    </div>`;
  }).join("");
  return `<div class="card"><h2>My Goals</h2><p class="sub">Set automatically from your diagnostic. Reach each target by completing the matching activities in your weekly plan.</p></div>${cards}`;

 {q:"Choose the correct tense: \"Yesterday, she ___ to the market.\"",options:["go","goes","went","gone"],answer:2},
 {q:"Which sentence is punctuated correctly?",options:["Its raining today.","It's raining today.","Its' raining today.","Its raining, today"],answer:1},
 {q:"Choose the best correction: \"Me and him went home.\"",options:["Me and him went home.","Him and me went home.","He and I went home.","I and he went home."],answer:2},
 {q:"Choose the correct word: \"They left ___ books at home.\"",options:["there","their","they're","theyre"],answer:1},
 {q:"Which is a complete sentence?",options:["Running fast.","Because it rained.","The dog barked.","After the game."],answer:2},
 {q:"Choose the plural: \"one child, two ___\"",options:["childs","children","childes","child"],answer:1},
 {q:"Subject-verb agreement: \"Neither answer ___ correct.\"",options:["are","is","were","be"],answer:1},
 {q:"Apostrophe: \"the ___ toys\" (toys belonging to the dogs)",options:["dogs","dog's","dogs'","dogses"],answer:2},
 {q:"Choose the adverb: \"She sang ___.\"",options:["beautiful","beauty","beautifully","beautify"],answer:2},
 {q:"Comma use: \"After dinner ___ we watched a film.\"",options:["After dinner we","After dinner, we","After, dinner we","After dinner; we"],answer:1},
 {q:"Pronoun: \"Each student must bring ___ own pen.\"",options:["their","his or her","them","they"],answer:1},
 {q:"Choose the correct word: \"I have ___ apples than you.\"",options:["less","fewer","lesser","few"],answer:1},
 {q:"Rewrite in the active voice: \"The ball was thrown by Sam.\"",options:["The ball was thrown.","Sam threw the ball.","The ball, thrown by Sam.","Thrown the ball Sam."],answer:1},
 {q:"Which is capitalised correctly?",options:["i visited london in july.","I visited London in July.","I visited london in July.","i visited London in july."],answer:1}
];

 {q:"Synonym of \"rapid\":",options:["slow","quick","heavy","quiet"],answer:1},
 {q:"Antonym of \"ancient\":",options:["old","modern","huge","dark"],answer:1},
 {q:"\"Generous\" means:",options:["selfish","giving","tired","loud"],answer:1},

const WRITING_PRACTICE_PROMPTS=[
 "Write a short paragraph (at least 40 words) about a place you would like to visit and why.",
 "Describe your typical school day. Use a topic sentence and at least three details.",
 "Do you think students should have longer breaks? Give your opinion with two reasons.",
 "Write about a time you helped someone. What happened, and how did you feel?",
 "Describe your favourite season using sensory details (sights, sounds and smells)."
];
function exRnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function exPickN(arr,k){const c=arr.slice(),o=[];while(o.length<k&&c.length)o.push(c.splice(exRnd(0,c.length-1),1)[0]);return o;}
function genMath(strand){
  const items=[];
  for(let i=0;i<5;i++){
    if(strand.indexOf("Number")>=0){
      const t=exRnd(0,3);
      if(t===0){const a=exRnd(12,99),b=exRnd(12,99);items.push({q:`${a} + ${b} = ?`,answer:a+b});}
      else if(t===1){const a=exRnd(50,99),b=exRnd(10,49);items.push({q:`${a} − ${b} = ?`,answer:a-b});}
      else if(t===2){const a=exRnd(3,12),b=exRnd(3,12);items.push({q:`${a} × ${b} = ?`,answer:a*b});}
      else {const b=exRnd(2,9),x=exRnd(2,12);items.push({q:`${b*x} ÷ ${b} = ?`,answer:x});}
    } else if(strand.indexOf("Algebra")>=0){
      const a=exRnd(2,6),x=exRnd(1,9),b=exRnd(1,9);items.push({q:`Solve for x:  ${a}x + ${b} = ${a*x+b}`,answer:x});
    } else if(strand.indexOf("Geometry")>=0){
      const t=exRnd(0,2);
      if(t===0){const w=exRnd(3,12),hh=exRnd(3,12);items.push({q:`Area of a rectangle ${w} × ${hh} = ?`,answer:w*hh});}
      else if(t===1){const w=exRnd(3,12),hh=exRnd(3,12);items.push({q:`Perimeter of a rectangle ${w} × ${hh} = ?`,answer:2*(w+hh)});}
      else {const b=exRnd(4,12),hh=exRnd(2,10);items.push({q:`Area of a triangle with base ${b} and height ${hh} = ?`,answer:b*hh/2});}
    } else {
      const arr=Array.from({length:4},()=>exRnd(2,20));const sum=arr.reduce((a,b)=>a+b,0);
      items.push({q:`Find the mean of ${arr.join(", ")}`,answer:Math.round(sum/4*100)/100});
    }
  }
  return items;
}
function buildExercise(skill){
  if(skill==="Reading"){const p=READING_PASSAGES[exRnd(0,READING_PASSAGES.length-1)];return {type:"mcq",intro:`<b>${p.title}</b><br>${p.text}`,items:p.qs};}
  if(skill==="Grammar")return {type:"mcq",items:exPickN(GRAMMAR_POOL,5)};
  if(skill==="Vocabulary")return {type:"mcq",items:exPickN(VOCAB_POOL,5)};
  if(skill==="Writing")return {type:"writing",prompt:WRITING_PRACTICE_PROMPTS[exRnd(0,WRITING_PRACTICE_PROMPTS.length-1)]};
  return {type:"mathinput",items:genMath(skill)};
}
let EX=null;
function launchExercise(key,skill){ if(READONLY) return; EX={key,skill,def:buildExercise(skill),resp:{},submitted:false}; renderExercise(); }
function exPick(i,oi){ if(EX.submitted)return; EX.resp[i]=oi; renderExercise(); }
function exInput(i,v){ EX.resp[i]=v; }
function exWrite(v){ EX.resp.text=v; }
function submitExercise(){
  const d=EX.def;
  if(d.type==="mcq"){let c=0; d.items.forEach((it,i)=>{ if(EX.resp[i]===it.answer)c++; }); EX.correct=c; EX.total=d.items.length; EX.score=Math.round(c/d.items.length*100);}
  else if(d.type==="mathinput"){let c=0; d.items.forEach((it,i)=>{ const v=parseFloat(String(EX.resp[i]==null?"":EX.resp[i]).replace(/[^0-9.\-]/g,"")); if(!isNaN(v)&&Math.abs(v-it.answer)<0.02)c++; }); EX.correct=c; EX.total=d.items.length; EX.score=Math.round(c/d.items.length*100);}
  else { const t=(EX.resp.text||""); EX.words=t.trim()?t.trim().split(/\s+/).length:0; EX.score=writingScore(t); }
  EX.submitted=true; renderExercise();
}
function finishExercise(){ if(EX){ S.taskDone[EX.key]=true; save(); } closeExercise(); render(); }
function closeExercise(){ EX=null; const m=document.getElementById("exModal"); if(m){ m.style.display="none"; m.innerHTML=""; } }
function renderExercise(){
  const m=document.getElementById("exModal"); const d=EX.def; let body="";
  if(d.type==="writing"){
    body=`<p style="font-size:14px;background:#f6faf8;border:1px solid var(--line);border-radius:8px;padding:12px">${d.prompt}</p>
      <textarea oninput="exWrite(this.value)" rows="8" placeholder="Write your response here…" style="width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical">${(EX.resp.text||"").replace(/</g,"&lt;")}</textarea>`;
  } else {
    if(d.intro) body+=`<div class="exq" style="background:#f9fbfc">${d.intro}</div>`;
    if(d.type==="mcq"){
      d.items.forEach((it,i)=>{
        body+=`<div class="exq"><div style="font-weight:600;margin-bottom:8px">Q${i+1}. ${it.q}</div>`;
        it.options.forEach((o,oi)=>{
          let cls="opt"; if(EX.resp[i]===oi)cls+=" sel";
          if(EX.submitted){ if(oi===it.answer)cls+=" exok"; else if(EX.resp[i]===oi)cls+=" exbad"; }
          body+=`<label class="${cls}" onclick="exPick(${i},${oi})">${o}</label>`;
        });
        body+=`</div>`;
      });
    } else {
      d.items.forEach((it,i)=>{
        let mark="";
        if(EX.submitted){ const v=parseFloat(String(EX.resp[i]==null?"":EX.resp[i]).replace(/[^0-9.\-]/g,"")); const ok=!isNaN(v)&&Math.abs(v-it.answer)<0.02; mark=` <span style="font-weight:700;color:${ok?'var(--ok)':'var(--red)'}">${ok?'✓':'✗ ('+it.answer+')'}</span>`; }
        body+=`<div class="exq"><div style="font-weight:600;margin-bottom:8px">Q${i+1}. ${it.q}</div>
          <input ${EX.submitted?"disabled":""} value="${EX.resp[i]!=null?EX.resp[i]:""}" oninput="exInput(${i},this.value)" placeholder="Your answer" style="max-width:220px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px">${mark}</div>`;
      });
    }
  }
  let footer="";
  if(!EX.submitted){ footer=`<button class="btn gold" onclick="submitExercise()">Check answers</button><button class="btn ghost" onclick="closeExercise()">Cancel</button>`; }
  else{
    const msg = d.type==="writing"
      ? `You wrote <b>${EX.words}</b> words — provisional score <b>${EX.score}%</b> (your teacher gives the final mark).`
      : `You scored <b>${EX.correct}/${EX.total}</b> &nbsp;(<b>${EX.score}%</b>).`;
    footer=`<div class="notice" style="margin:0;background:${EX.score>=60?'#e5f3ec':'#fdf3da'};border-color:#cfe6da;flex:1 1 100%">${msg} ${EX.score>=60?'Great work! 🎉':'Keep practising — try again any time.'}</div>
      <button class="btn" onclick="finishExercise()">✓ Finish &amp; mark complete</button>
      <button class="btn ghost" onclick="closeExercise()">Close</button>`;
  }
  m.innerHTML=`<div class="ovl"><div class="ex">
    <div class="flex-between"><h2 style="margin:0">Practice — ${EX.skill}</h2><button class="btn ghost sm" onclick="closeExercise()">✕</button></div>
    <p class="sub">Complete the activity below. When you finish, it is ticked off and your progress updates automatically.</p>
    ${body}
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">${footer}</div>
  </div></div>`;
  m.style.display="block";
}

});

});

fbAuth.onAuthStateChanged(function(user){
  _unsub.forEach(u=>{try{u()}catch(e){}}); _unsub=[];
  if(!user){ AUTH=null; CACHE={assignments:[]}; S=freshState(); render(); return; }
  db.collection("users").doc(user.uid).get().then(doc=>{
    AUTH=Object.assign({uid:user.uid,email:(user.email||"").toLowerCase()}, doc.exists?doc.data():{role:"student",name:user.email});
    CACHE={assignments:[]};
    startListeners();
    if(AUTH.role==="student") loadStateForUser();
    render();
  }).catch(e=>{ console.warn(e); render(); });
});
